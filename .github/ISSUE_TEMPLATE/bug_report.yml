name: Bug report
description: Report a problem with Globber
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please do **not** report
        security vulnerabilities here — see [SECURITY.md](../blob/master/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I add a rule like `+1800*`, calls still ring through.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Rules
        2. Add pattern '...'
        3. Receive a call from '...'
        4. See behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Globber version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device & Android version
      placeholder: e.g. Pixel 7, Android 14
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Optional. Paste relevant logcat output or screenshots.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: Globber is set as the call-screening app in system settings
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true
