<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="1280" height="360" rx="36"/>
    </clipPath>

    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAFF8C"/>
      <stop offset="0.5" stop-color="#C6FF00"/>
      <stop offset="1" stop-color="#9BE000"/>
    </linearGradient>

    <linearGradient id="white" x1="0.2" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#DFE8D4"/>
    </linearGradient>

    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDev="70"/>
    </filter>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDev="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1280" height="360" fill="#0a0c07"/>

    <!-- blurred neon-lime glow blobs -->
    <g filter="url(#blur)">
      <circle cx="220" cy="120" r="180" fill="#C6FF00" opacity="0.45"/>
      <circle cx="120" cy="320" r="200" fill="#6FD400" opacity="0.35"/>
      <circle cx="1180" cy="300" r="170" fill="#9BE000" opacity="0.30"/>
    </g>

    <!-- icon mark -->
    <g transform="translate(120 60) scale(0.235)" filter="url(#shadow)">
      <path fill="url(#white)" transform="rotate(-10 512 540)"
            d="M372 392
               c 22 -22 58 -22 80 0
               l 50 50 c 20 20 22 52 4 74
               l -20 25 c -10 12 -9 30 2 41
               l 82 82 c 11 11 29 12 41 2
               l 25 -20 c 22 -18 54 -16 74 4
               l 50 50 c 22 22 22 58 0 80
               l -32 32 c -28 28 -70 36 -106 20
               C 535 776 432 673 376 540
               c -16 -36 -8 -78 20 -106 Z"/>
      <g transform="translate(690 348)">
        <circle r="128" fill="#0a0c07"/>
        <circle r="128" fill="none" stroke="url(#lime)" stroke-width="6" opacity="0.5"/>
        <g fill="url(#lime)">
          <rect x="-19" y="-70" width="38" height="140" rx="19"/>
          <rect x="-19" y="-70" width="38" height="140" rx="19" transform="rotate(60)"/>
          <rect x="-19" y="-70" width="38" height="140" rx="19" transform="rotate(120)"/>
          <circle r="21"/>
        </g>
      </g>
    </g>

    <!-- wordmark -->
    <text x="370" y="190" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
          font-size="104" font-weight="800" fill="url(#white)" letter-spacing="-3">Globber</text>
    <text x="374" y="248" font-family="'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif"
          font-size="34" font-weight="500" fill="#C6FF00" letter-spacing="0.5">Pattern-matching call blocker for Android</text>

    <!-- accent rule -->
    <rect x="374" y="278" width="300" height="6" rx="3" fill="url(#lime)"/>
  </g>
</svg>
